<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>What's Running Your Life? | The Override</title>
<meta name="description" content="Find the unconscious pattern running your life, and the first move to override it." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,600;0,800;0,900;1,800&family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --black:#0a0a0a; --pure:#000; --white:#ffffff;
    --accent:#f0a500; --accent-dark:#c78700;
    --green:#1f3d33; --green-soft:#2c5446; --green-text:#7bbfa6;
    --muted:#7a7a7a; --muted2:#9a9a9a; --line:#1e1e1e; --card:#121212;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #14241e 0%, transparent 60%), var(--black);
    color:var(--white);font-family:"Space Grotesk",sans-serif;line-height:1.5;
    min-height:100vh;display:flex;flex-direction:column;
  }
  a{color:inherit;}
  .wrap{width:100%;max-width:720px;margin:0 auto;padding:0 22px;}

  header{padding:22px 0;flex:0 0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-family:"Archivo Black",sans-serif;text-transform:uppercase;font-size:18px;letter-spacing:-0.01em;text-decoration:none;}
  .brand span{color:var(--accent);}
  .back{font-size:12.5px;color:var(--muted2);text-decoration:none;text-transform:uppercase;letter-spacing:.1em;}
  .back:hover{color:var(--white);}

  main{flex:1 1 auto;display:flex;align-items:center;padding:24px 0 60px;}
  .stage{width:100%;}
  .fade{animation:fade .4s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .eyebrow{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--accent);margin-bottom:16px;}
  h1{font-family:"Archivo Black",sans-serif;text-transform:uppercase;line-height:.98;letter-spacing:-0.01em;font-size:clamp(40px,7.4vw,72px);}
  .body-copy{color:#cfcfcf;font-size:clamp(16px,2.3vw,18px);margin-top:20px;max-width:540px;line-height:1.55;}
  .body-copy.muted{color:var(--muted2);font-size:15px;margin-top:18px;}
  .pattern-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:22px;max-width:560px;}
  .pattern-row span{border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:13px;color:#cfcfcf;background:rgba(255,255,255,0.02);}
  .meta{color:var(--muted2);font-size:14px;margin-top:18px;letter-spacing:.02em;}

  .btn{display:inline-block;font-family:"Archivo Black",sans-serif;text-transform:uppercase;letter-spacing:.02em;
    cursor:pointer;border:none;transition:transform .12s ease, background .15s ease;text-decoration:none;}
  .btn-accent{background:var(--accent);color:#000 !important;padding:17px 34px;border-radius:999px;font-size:16px;}
  .btn-accent:hover{transform:translateY(-2px) scale(1.02);}
  .btn-ghost{background:transparent;color:var(--white) !important;border:2px solid var(--line);padding:15px 30px;border-radius:999px;font-size:14px;}
  .btn-ghost:hover{border-color:var(--white);}
  .start-row{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}

  .progress{display:flex;align-items:center;gap:14px;margin-bottom:30px;}
  .pbar{flex:1;height:5px;border-radius:999px;background:var(--line);overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:999px;transition:width .4s ease;}
  .pcount{font-size:12.5px;color:var(--muted2);letter-spacing:.08em;white-space:nowrap;}

  .qtext{font-family:"Archivo",sans-serif;font-weight:800;font-size:clamp(23px,3.8vw,33px);line-height:1.14;letter-spacing:-0.01em;margin-bottom:26px;}
  .opts{display:flex;flex-direction:column;gap:11px;}
  .opt{
    text-align:left;width:100%;background:rgba(255,255,255,0.025);border:1px solid var(--line);
    border-radius:14px;padding:17px 20px;color:#e8e8e8;font-family:inherit;font-size:16px;line-height:1.4;
    cursor:pointer;transition:border-color .14s, background .14s, transform .08s;backdrop-filter:blur(4px);
  }
  .opt:hover{border-color:var(--accent);background:rgba(240,165,0,0.06);}
  .opt:active{transform:scale(.995);}

  .res-eyebrow{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--muted2);margin-bottom:12px;}
  .res-name{font-family:"Archivo Black",sans-serif;text-transform:uppercase;font-size:clamp(34px,6.5vw,58px);line-height:.98;}
  .res-name .gold{color:var(--accent);}
  .belief{font-family:"Archivo",sans-serif;font-style:italic;font-weight:800;color:var(--accent);font-size:clamp(18px,2.6vw,23px);margin-top:18px;line-height:1.3;}
  .reframe{color:#e8e8e8;font-size:17px;line-height:1.6;margin-top:18px;max-width:580px;}

  .card{
    background:linear-gradient(180deg, rgba(31,61,51,0.35), rgba(18,18,18,0.6));
    border:1px solid var(--green-soft);border-radius:18px;padding:24px;margin-top:30px;
    box-shadow:0 24px 60px rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  }
  .card h3{font-family:"Archivo",sans-serif;font-weight:800;font-size:18px;margin-bottom:6px;}
  .card p.sub{color:var(--muted2);font-size:14.5px;margin-bottom:16px;line-height:1.5;}
  .lf{display:flex;flex-direction:column;gap:10px;}
  .lf input{background:var(--black);border:1px solid var(--line);border-radius:11px;color:var(--white);padding:13px 15px;font-family:inherit;font-size:15px;}
  .lf input:focus{outline:none;border-color:var(--accent);}
  .lf .err{color:#ff6b6b;font-size:13px;display:none;}
  .lf button{margin-top:4px;width:100%;}
  .priv{color:var(--muted);font-size:12px;margin-top:12px;text-align:center;}

  .block{margin-top:26px;}
  .block .label{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.16em;font-size:12px;margin-bottom:12px;}
  .block .label.gold{color:var(--accent);}
  .block .label.green{color:var(--green-text);}
  .block .label.gray{color:var(--muted2);}
  .rlist{list-style:none;display:flex;flex-direction:column;gap:9px;}
  .rlist li{position:relative;padding-left:22px;color:#dcdcdc;font-size:16px;line-height:1.5;}
  .rlist li:before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border-radius:50%;background:var(--muted);}
  .rlist.gold li:before{background:var(--accent);}
  .rlist.green li:before{background:var(--green-text);}
  .secondary{margin-top:26px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted2);font-size:14.5px;line-height:1.5;}
  .secondary b{color:var(--white);font-weight:600;}
  .res-cta{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .restart{display:inline-block;margin-top:24px;color:var(--muted2);font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;}
  .restart:hover{color:var(--white);}

  footer{flex:0 0 auto;padding:26px 0;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px;text-align:center;}
  footer a{color:var(--muted2);}
</style>
  <!-- Cloudflare Web Analytics --><script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5aa027499d2f482abd487a388cd352c8"}'></script><!-- End Cloudflare Web Analytics -->
</head>
<body>
<header>
  <div class="wrap topbar">
    <a class="brand" href="/">THE<span>OVERRIDE</span></a>
    <a class="back" href="/">&larr; Home</a>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="stage" id="stage"></div>
  </div>
</main>

<footer>
  <div class="wrap">The Override is coaching, not therapy. &nbsp;·&nbsp; <a href="/">theoverride.co</a></div>
</footer>

<script>
(function(){
  var LEAD_ENDPOINT="https://override-coaching-chatbot.roblesinc.workers.dev/lead";
  var CALENDLY="https://calendly.com/roblesinc/consultation";
  var GUIDE_PDF="https://roblesmedia.github.io/the-override/override-starter-guide.pdf";

  var PATTERNS={
    achiever:{name:"The Achiever",
      belief:"“I am what I accomplish.”",
      reframe:"Your pattern isn't laziness or lack of drive. It's the opposite. You've learned to tie your worth to your output. Somewhere along the way, achievement became the way you stay safe, valued, and respected.",
      gives:["Discipline most people wish they had","Drive that actually gets things done","Reliability people know they can count on"],
      costs:["Rest feels unproductive, even wrong","Relationships get pushed to the back burner","Success never quite feels like enough"],
      override:["Worth before productivity","Presence before performance","Intention before autopilot"]},
    fixer:{name:"The Fixer",
      belief:"“If I don't hold it together, no one will.”",
      reframe:"Your pattern isn't weakness or people-pleasing. It's care turned all the way up. You learned that being needed is how you stay connected and safe, so you became the one who handles everything for everyone.",
      gives:["A big heart people feel instantly","The ability to hold things together under pressure","Loyalty that runs deep"],
      costs:["Your own needs always land last","Quiet resentment you never say out loud","Exhaustion from carrying what isn't yours"],
      override:["Your needs alongside theirs","Receiving, not just giving","Letting people carry their own weight"]},
    peacekeeper:{name:"The Peacekeeper",
      belief:"“If I keep everyone comfortable, I'll be okay.”",
      reframe:"Your pattern isn't weakness. It's a finely-tuned radar for everyone else's comfort. You learned that smoothing things over keeps you safe, so you got good at going along, even when it quietly costs you.",
      gives:["People feel calm and easy around you","You read a room better than anyone","You rarely make a situation worse"],
      costs:["Your real opinion stays unsaid","Resentment builds where no one can see it","You slowly disappear from your own life"],
      override:["Honesty over smoothness","Your voice over the room's comfort","The real thing over the easy thing"]},
    perfectionist:{name:"The Perfectionist",
      belief:"“If it's not perfect, it's not ready.”",
      reframe:"Your pattern isn't procrastination. It's protection. High standards started as your edge, but quietly became a place to hide. As long as it isn't finished, it can't be judged.",
      gives:["Standards that produce real quality","An eye for what everyone else misses","Work people trust"],
      costs:["Things stall and never ship","Procrastination disguised as “getting it right”","You're rarely satisfied, even with good work"],
      override:["Done over perfect","Action before certainty","Progress over polish"]},
    controller:{name:"The Controller",
      belief:"“If I don't stay on top of it, things start slipping.”",
      reframe:"Your pattern isn't being a control freak. It's how you've learned to feel safe in a world that's felt unpredictable. Managing every variable is how you keep the floor from dropping out.",
      gives:["You make things happen others can't","People feel safe in your hands","Nothing falls through the cracks on your watch"],
      costs:["Chronic tension you can't switch off","Relationships strained by the grip","You can't actually rest"],
      override:["Trust over control","Letting uncertainty exist","Loosening the grip and staying okay"]},
    avoider:{name:"The Avoider",
      belief:"“I'll deal with it later.”",
      reframe:"Your pattern isn't laziness. It's self-protection. Somewhere you learned that staying uncommitted keeps you safe from failing, so “later” became the place you put the things that matter most.",
      gives:["You're adaptable and easygoing","You don't crack under pressure","You see options other people rush right past"],
      costs:["The things that matter keep waiting","“Someday” quietly eats the years","A low hum of stuck you can't quite name"],
      override:["A direction over drift","Committing before you feel ready","Momentum over comfort"]}
  };
  // tie-break priority (earlier wins a tie)
  var ORDER=["perfectionist","achiever","controller","fixer","peacekeeper","avoider"];

  var QUESTIONS=[
    {q:"When stress starts building, what usually happens first?",o:[
      {t:"You stay busy and push through it.",p:"achiever"},
      {t:"You shift into solving everyone else's problems.",p:"fixer"},
      {t:"You go quiet and hope it settles on its own.",p:"peacekeeper"},
      {t:"You start researching, planning, or overthinking.",p:"perfectionist"},
      {t:"You try to get a handle on every moving piece.",p:"controller"},
      {t:"You check out and tell yourself you'll deal with it later.",p:"avoider"}]},
    {q:"It's been a heavy week. What does that tend to look like for you?",o:[
      {t:"Doubling down at work even though you're fried.",p:"achiever"},
      {t:"Being everyone's go-to while you run on fumes.",p:"fixer"},
      {t:"Smiling through it so nobody worries about you.",p:"peacekeeper"},
      {t:"Lying awake replaying what you could've done better.",p:"perfectionist"},
      {t:"Trying to keep everything from slipping at once.",p:"controller"},
      {t:"Going through the motions and numbing out.",p:"avoider"}]},
    {q:"What's the closest thing to a private motto you'd never say out loud?",o:[
      {t:"“Slowing down means falling behind.”",p:"achiever"},
      {t:"“Everyone needs me, so I can't stop.”",p:"fixer"},
      {t:"“It's easier to just go along.”",p:"peacekeeper"},
      {t:"“If it's not right, it's not ready.”",p:"perfectionist"},
      {t:"“If I don't stay on top of it, things start slipping.”",p:"controller"},
      {t:"“I'll get to it… eventually.”",p:"avoider"}]},
    {q:"Where does the tension usually show up in your relationships?",o:[
      {t:"You're present but always half-thinking about what's next.",p:"achiever"},
      {t:"You over-give, then quietly resent it.",p:"fixer"},
      {t:"You dodge the hard conversation to keep the peace.",p:"peacekeeper"},
      {t:"You hold people, and yourself, to a bar nobody can hit.",p:"perfectionist"},
      {t:"You struggle to let others do it their own way.",p:"controller"},
      {t:"You pull back or check out when things get real.",p:"avoider"}]},
    {q:"There's something you've meant to change for a while. What's actually been in the way?",o:[
      {t:"You stay so busy you never make space for it.",p:"achiever"},
      {t:"Everyone else's stuff keeps coming first.",p:"fixer"},
      {t:"You don't want to upset anyone by changing things.",p:"peacekeeper"},
      {t:"You're still trying to figure out the best way to do it.",p:"perfectionist"},
      {t:"You won't move until you're sure how it'll turn out.",p:"controller"},
      {t:"You start, lose steam, and drift off it.",p:"avoider"}]},
    {q:"If a quiet, honest part of you could ask for one thing, it'd be…",o:[
      {t:"To feel like enough without having to earn it.",p:"achiever"},
      {t:"To be taken care of, for once.",p:"fixer"},
      {t:"To say what you actually think.",p:"peacekeeper"},
      {t:"To stop needing it to be perfect.",p:"perfectionist"},
      {t:"To loosen your grip and still feel safe.",p:"controller"},
      {t:"To actually follow through on something that matters.",p:"avoider"}]},
    {q:"When you picture a goal that really matters, what tends to get in the way most?",o:[
      {t:"You never feel satisfied with the progress you're making.",p:"achiever"},
      {t:"You're too busy carrying everyone else.",p:"fixer"},
      {t:"You worry about how people will react.",p:"peacekeeper"},
      {t:"You wait until you feel fully prepared.",p:"perfectionist"},
      {t:"You need to be certain before you'll act.",p:"controller"},
      {t:"You struggle to stay consistent over time.",p:"avoider"}]}
  ];

  var stage=document.getElementById('stage');
  var idx=0, scores={}, transcript=[], primaryKey=null, secondaryKey=null;
  ORDER.forEach(function(k){ scores[k]=0; });

  function sid(){
    try{ var k='ovQuizSession',v=localStorage.getItem(k);
      if(!v){ v=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():('q-'+Date.now()+'-'+Math.random().toString(16).slice(2)); localStorage.setItem(k,v); } return v;
    }catch(_){ return 'q-'+Date.now(); }
  }
  var sessionId=sid();
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function set(html){ stage.innerHTML='<div class="fade">'+html+'</div>'; window.scrollTo(0,0); }
  function goldName(n){ return n.replace(/^The /,'The <span class="gold">')+'</span>'; }
  function list(arr,cls){ return '<ul class="rlist '+cls+'">'+arr.map(function(x){return '<li>'+esc(x)+'</li>';}).join('')+'</ul>'; }
  function reset(){ ORDER.forEach(function(k){ scores[k]=0; }); transcript=[]; idx=0; primaryKey=null; secondaryKey=null; }

  // ---------- intro ----------
  function intro(){
    var pills=["The Achiever","The Fixer","The Peacekeeper","The Perfectionist","The Controller","The Avoider"]
      .map(function(n){ return '<span>'+n+'</span>'; }).join('');
    set(
      '<div class="eyebrow">You are not your patterns.</div>'+
      '<h1>What’s running<br>your life?</h1>'+
      '<p class="body-copy">Most people think they’re making conscious choices. But underneath the surface, a pattern is often making the decisions for them.</p>'+
      '<div class="pattern-row">'+pills+'</div>'+
      '<p class="body-copy muted">This 2-minute check reveals the pattern most influencing your life right now. No right or wrong answers, just choose what feels most true today.</p>'+
      '<div class="start-row"><button class="btn btn-accent" id="startBtn">Find out</button></div>'+
      '<p class="meta">7 questions · about 2 minutes</p>'
    );
    document.getElementById('startBtn').addEventListener('click',function(){ idx=0; question(); });
  }

  // ---------- questions ----------
  function question(){
    var Q=QUESTIONS[idx];
    var pct=Math.round((idx/QUESTIONS.length)*100);
    var opts=Q.o.map(function(o,i){ return '<button class="opt" data-i="'+i+'">'+esc(o.t)+'</button>'; }).join('');
    set(
      '<div class="progress"><div class="pbar"><i style="width:'+pct+'%"></i></div><div class="pcount">'+(idx+1)+' / '+QUESTIONS.length+'</div></div>'+
      '<div class="qtext">'+esc(Q.q)+'</div>'+
      '<div class="opts">'+opts+'</div>'
    );
    stage.querySelectorAll('.opt').forEach(function(b){
      b.addEventListener('click',function(){
        var choice=Q.o[parseInt(b.getAttribute('data-i'),10)];
        scores[choice.p]+=1;
        transcript.push({role:'user',content:Q.q+' → '+choice.t});
        idx++;
        if(idx>=QUESTIONS.length){ computeResult(); resultTeaser(); }
        else question();
      });
    });
  }

  function computeResult(){
    var ranked=ORDER.slice().sort(function(a,b){ return scores[b]-scores[a]; });
    primaryKey=ranked[0];
    secondaryKey=(scores[ranked[1]]>0 && ranked[1]!==primaryKey) ? ranked[1] : null;
  }

  // ---------- teaser (reframe + email gate) ----------
  function resultTeaser(){
    var P=PATTERNS[primaryKey];
    set(
      '<div class="res-eyebrow">Your primary pattern</div>'+
      '<div class="res-name">'+goldName(P.name)+'</div>'+
      '<div class="belief">'+esc(P.belief)+'</div>'+
      '<p class="reframe">'+esc(P.reframe)+'</p>'+
      '<div class="card">'+
        '<h3>Get your full breakdown</h3>'+
        '<p class="sub">What this pattern gives you, what it’s quietly costing you, your secondary pattern, and the first move to override it, sent to your inbox.</p>'+
        '<div class="lf">'+
          '<input id="qName" type="text" placeholder="First name" autocomplete="given-name" />'+
          '<input id="qEmail" type="email" placeholder="Email" autocomplete="email" />'+
          '<div class="err" id="qErr"></div>'+
          '<button class="btn btn-accent" id="qSend">Unlock my breakdown</button>'+
        '</div>'+
        '<p class="priv">No spam. Just your result and the occasional note from David.</p>'+
      '</div>'+
      '<button class="restart" id="qRestart">Start over</button>'
    );
    document.getElementById('qRestart').addEventListener('click',function(){ reset(); intro(); });
    document.getElementById('qSend').addEventListener('click',submitEmail);
    document.getElementById('qEmail').addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); submitEmail(); }});
  }

  async function submitEmail(){
    var name=(document.getElementById('qName').value||'').trim();
    var email=(document.getElementById('qEmail').value||'').trim();
    var err=document.getElementById('qErr'); var btn=document.getElementById('qSend');
    err.style.display='none';
    if(!name || !email || email.indexOf('@')<1){ err.textContent='Add your first name and a valid email.'; err.style.display='block'; return; }
    btn.disabled=true; btn.textContent='Unlocking…';
    var note='Primary: '+PATTERNS[primaryKey].name+(secondaryKey?(' / Secondary: '+PATTERNS[secondaryKey].name):'');
    try{
      var res=await fetch(LEAD_ENDPOINT,{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({type:'quiz',name:name,email:email,note:note,sessionId:sessionId,transcript:transcript})});
      var data=await res.json();
      if(!res.ok||!data.ok) throw new Error((data&&data.error)||'failed');
      resultFull(name);
    }catch(_){ btn.disabled=false; btn.textContent='Unlock my breakdown'; err.textContent="That didn't go through. Try once more?"; err.style.display='block'; }
  }

  // ---------- full result ----------
  function resultFull(name){
    var P=PATTERNS[primaryKey];
    var sec='';
    if(secondaryKey){
      var S=PATTERNS[secondaryKey];
      sec='<div class="secondary">You also carry a strong streak of <b>'+esc(S.name)+'</b>. '+esc(S.belief)+' Most people are a blend; this is the one running second.</div>';
    }
    set(
      '<div class="res-eyebrow">'+(name?esc(name)+', here’s your pattern':'Your pattern')+'</div>'+
      '<div class="res-name">'+goldName(P.name)+'</div>'+
      '<div class="belief">'+esc(P.belief)+'</div>'+
      '<p class="reframe">'+esc(P.reframe)+'</p>'+
      '<div class="block"><div class="label gray">What this pattern gives you</div>'+list(P.gives,'')+'</div>'+
      '<div class="block"><div class="label gold">What it costs you</div>'+list(P.costs,'gold')+'</div>'+
      '<div class="block"><div class="label green">The override</div>'+list(P.override,'green')+'</div>'+
      sec+
      '<div class="card" style="border-color:var(--accent);">'+
        '<h3>Ready to actually override it?</h3>'+
        '<p class="sub">The fastest way forward is a real conversation. Book a free call with David. You’ll leave it clearer than you came.</p>'+
        '<a class="btn btn-accent" href="'+CALENDLY+'" target="_blank" rel="noopener" style="width:100%;text-align:center;">Book your free consultation</a>'+
      '</div>'+
      '<div class="res-cta">'+
        '<a class="btn btn-ghost" href="'+GUIDE_PDF+'" target="_blank" rel="noopener">Get the free guide</a>'+
        '<button class="restart" id="qRestart2">Retake it</button>'+
      '</div>'
    );
    document.getElementById('qRestart2').addEventListener('click',function(){ reset(); intro(); });
  }

  intro();
})();
</script>
</body>
</html>
