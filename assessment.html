<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<title>The Pattern Assessment — The Override</title>
<meta name="description" content="A 2-minute assessment to reveal the unconscious pattern running your life — and the first move to override it." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;800;900&family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --black:#0a0a0a; --pure:#000; --white:#ffffff;
    --accent:#f0a500; --accent-dark:#c78700;
    --green:#1f3d33; --green-soft:#2c5446;
    --muted:#7a7a7a; --muted2:#9a9a9a; --line:#1e1e1e; --card:#121212;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #14241e 0%, transparent 60%), var(--black);
    color:var(--white);font-family:"Space Grotesk",sans-serif;line-height:1.5;
    min-height:100vh;display:flex;flex-direction:column;
  }
  a{color:inherit;}
  .wrap{width:100%;max-width:720px;margin:0 auto;padding:0 22px;}

  /* header */
  header{padding:22px 0;flex:0 0 auto;}
  .topbar{display:flex;align-items:center;justify-content:space-between;}
  .brand{font-family:"Archivo Black",sans-serif;text-transform:uppercase;font-size:18px;letter-spacing:-0.01em;text-decoration:none;}
  .brand span{color:var(--accent);}
  .back{font-size:12.5px;color:var(--muted2);text-decoration:none;text-transform:uppercase;letter-spacing:.1em;}
  .back:hover{color:var(--white);}

  /* stage */
  main{flex:1 1 auto;display:flex;align-items:center;padding:24px 0 60px;}
  .stage{width:100%;}
  .fade{animation:fade .4s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .eyebrow{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.22em;font-size:12px;color:var(--accent);margin-bottom:18px;}
  h1{font-family:"Archivo Black",sans-serif;text-transform:uppercase;line-height:.98;letter-spacing:-0.01em;font-size:clamp(38px,7vw,66px);}
  .lede{color:#cfcfcf;font-size:clamp(17px,2.4vw,20px);margin-top:20px;max-width:540px;line-height:1.5;}
  .meta{color:var(--muted2);font-size:14px;margin-top:18px;letter-spacing:.02em;}

  .btn{display:inline-block;font-family:"Archivo Black",sans-serif;text-transform:uppercase;letter-spacing:.02em;
    cursor:pointer;border:none;transition:transform .12s ease, background .15s ease;text-decoration:none;}
  .btn-accent{background:var(--accent);color:#000 !important;padding:17px 34px;border-radius:999px;font-size:16px;}
  .btn-accent:hover{transform:translateY(-2px) scale(1.02);}
  .btn-ghost{background:transparent;color:var(--white) !important;border:2px solid var(--line);padding:15px 30px;border-radius:999px;font-size:14px;}
  .btn-ghost:hover{border-color:var(--white);}
  .start-row{margin-top:38px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}

  /* progress */
  .progress{display:flex;align-items:center;gap:14px;margin-bottom:30px;}
  .pbar{flex:1;height:5px;border-radius:999px;background:var(--line);overflow:hidden;}
  .pbar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-dark));border-radius:999px;transition:width .4s ease;}
  .pcount{font-size:12.5px;color:var(--muted2);letter-spacing:.08em;white-space:nowrap;}

  .qtext{font-family:"Archivo",sans-serif;font-weight:800;font-size:clamp(24px,4vw,34px);line-height:1.12;letter-spacing:-0.01em;margin-bottom:26px;}
  .opts{display:flex;flex-direction:column;gap:11px;}
  .opt{
    text-align:left;width:100%;background:rgba(255,255,255,0.025);border:1px solid var(--line);
    border-radius:14px;padding:17px 20px;color:#e8e8e8;font-family:inherit;font-size:16px;line-height:1.4;
    cursor:pointer;transition:border-color .14s, background .14s, transform .08s;backdrop-filter:blur(4px);
  }
  .opt:hover{border-color:var(--accent);background:rgba(240,165,0,0.06);}
  .opt:active{transform:scale(.995);}

  /* result */
  .res-eyebrow{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.2em;font-size:12px;color:var(--muted2);margin-bottom:12px;}
  .res-name{font-family:"Archivo Black",sans-serif;text-transform:uppercase;font-size:clamp(34px,6.5vw,58px);line-height:.98;}
  .res-name .gold{color:var(--accent);}
  .res-tag{color:var(--accent);font-weight:600;font-size:clamp(16px,2.3vw,19px);margin-top:14px;}
  .res-teaser{color:#d7d7d7;font-size:17px;line-height:1.55;margin-top:16px;max-width:560px;}

  .card{
    background:linear-gradient(180deg, rgba(31,61,51,0.35), rgba(18,18,18,0.6));
    border:1px solid var(--green-soft);border-radius:18px;padding:24px;margin-top:30px;
    box-shadow:0 24px 60px rgba(0,0,0,0.5);backdrop-filter:blur(6px);
  }
  .card h3{font-family:"Archivo",sans-serif;font-weight:800;font-size:18px;margin-bottom:6px;}
  .card p.sub{color:var(--muted2);font-size:14.5px;margin-bottom:16px;line-height:1.5;}
  .lf{display:flex;flex-direction:column;gap:10px;}
  .lf input{background:var(--black);border:1px solid var(--line);border-radius:11px;color:var(--white);padding:13px 15px;font-family:inherit;font-size:15px;}
  .lf input:focus{outline:none;border-color:var(--accent);}
  .lf .err{color:#ff6b6b;font-size:13px;display:none;}
  .lf button{margin-top:4px;width:100%;}
  .priv{color:var(--muted);font-size:12px;margin-top:12px;text-align:center;}

  .block{margin-top:26px;}
  .block .label{font-family:"Archivo",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:.16em;font-size:12px;color:var(--accent);margin-bottom:8px;}
  .block .label.green{color:#7bbfa6;}
  .block p{color:#dcdcdc;font-size:16px;line-height:1.55;}
  .res-cta{margin-top:34px;display:flex;gap:14px;flex-wrap:wrap;align-items:center;}
  .restart{display:inline-block;margin-top:26px;color:var(--muted2);font-size:13px;text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;}
  .restart:hover{color:var(--white);}
  .hidden{display:none !important;}

  footer{flex:0 0 auto;padding:26px 0;border-top:1px solid var(--line);color:var(--muted);font-size:12.5px;text-align:center;}
  footer a{color:var(--muted2);}
</style>
</head>
<body>
<header>
  <div class="wrap topbar">
    <a class="brand" href="/">THE<span>OVERRIDE</span></a>
    <a class="back" href="/">&larr; Home</a>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="stage" id="stage"><!-- JS renders here --></div>
  </div>
</main>

<footer>
  <div class="wrap">The Override is coaching, not therapy. &nbsp;·&nbsp; <a href="/">theoverride.co</a></div>
</footer>

<script>
(function(){
  var LEAD_ENDPOINT="https://override-coaching-chatbot.roblesinc.workers.dev/lead";
  var CALENDLY="https://calendly.com/roblesinc/consultation";
  var GUIDE_PDF="https://roblesmedia.github.io/the-override/override-starter-guide.pdf";

  var PATTERNS={
    achiever:{name:"The Achiever",tag:"Your worth is wired to your output.",
      teaser:"You're driven, capable, and always producing — but rarely arriving. “Enough” never quite feels like enough.",
      cost:"Burnout, restlessness, and an identity so fused to performance that slowing down feels like failing.",
      override:"Separating who you are from what you produce — and choosing rest and presence on purpose, not as a reward you have to earn first."},
    fixer:{name:"The Fixer",tag:"You carry everyone but yourself.",
      teaser:"You're the one who handles it — for everyone. Being needed feels safer than being seen.",
      cost:"Quiet resentment, depletion, and your own needs always landing last.",
      override:"Letting other people carry their own weight — and learning to ask, out loud, for what you actually need."},
    peacekeeper:{name:"The Peacekeeper",tag:"You keep the peace at your own expense.",
      teaser:"You smooth things over, go along, and keep everyone comfortable — and slowly lose track of what you actually want.",
      cost:"Unspoken needs, buried resentment, and never quite showing up as yourself.",
      override:"Tolerating the discomfort of honesty — saying the real thing instead of the smooth thing."},
    perfectionist:{name:"The Perfectionist",tag:"Nothing's ever quite ready.",
      teaser:"Your standards started as an edge and became a cage. You overthink, polish, and delay — and call it “getting it right.”",
      cost:"Paralysis dressed up as high standards, and a pile of things you never shipped.",
      override:"Choosing “good and done” over “perfect and stuck” — and acting before you feel certain."},
    controller:{name:"The Controller",tag:"You white-knuckle the uncertainty.",
      teaser:"You manage outcomes, people, and every variable you can — because letting go feels like it'll all fall apart.",
      cost:"Chronic anxiety, exhaustion, and relationships strained by the grip.",
      override:"Loosening your hold — letting uncertainty exist without managing it, and trusting you'll be okay anyway."},
    drifter:{name:"The Drifter",tag:"Capable, coasting, and quietly stuck.",
      teaser:"You've got the talent, but you stay in motion without direction. “Someday” has been the plan for a while now.",
      cost:"Years slipping by, potential unrealized, and a low hum of dissatisfaction you can't quite name.",
      override:"Picking a direction and committing — trading comfortable drift for real momentum."}
  };
  var ORDER=["perfectionist","achiever","controller","fixer","peacekeeper","drifter"];

  var QUESTIONS=[
    {q:"When something feels off in your life, your default move is to…",o:[
      {t:"Work harder and produce more.",p:"achiever"},
      {t:"Take care of everyone around you first.",p:"fixer"},
      {t:"Keep the peace and not rock the boat.",p:"peacekeeper"},
      {t:"Analyze it until you get it perfect.",p:"perfectionist"},
      {t:"Tighten your grip and control what you can.",p:"controller"},
      {t:"Distract yourself and put it off.",p:"drifter"}]},
    {q:"Which story runs loudest in your head?",o:[
      {t:"“I have to keep proving myself.”",p:"achiever"},
      {t:"“If I don't handle it, no one will.”",p:"fixer"},
      {t:"“Don't make waves.”",p:"peacekeeper"},
      {t:"“It's still not good enough.”",p:"perfectionist"},
      {t:"“If I let go, it'll fall apart.”",p:"controller"},
      {t:"“I'll figure it out eventually.”",p:"drifter"}]},
    {q:"Rest mostly feels…",o:[
      {t:"Like falling behind.",p:"achiever"},
      {t:"Selfish — someone needs me.",p:"fixer"},
      {t:"Fine, as long as no one's upset.",p:"peacekeeper"},
      {t:"Impossible until everything's done right.",p:"perfectionist"},
      {t:"Risky — things slip when I stop watching.",p:"controller"},
      {t:"Easy. Maybe a little too easy.",p:"drifter"}]},
    {q:"The thing people don't see about you is…",o:[
      {t:"How exhausted you are under the success.",p:"achiever"},
      {t:"How much you're carrying for everyone.",p:"fixer"},
      {t:"How much you swallow to keep things smooth.",p:"peacekeeper"},
      {t:"How often you talk yourself out of starting.",p:"perfectionist"},
      {t:"How anxious you get when you're not in control.",p:"controller"},
      {t:"How stuck you feel behind the easygoing front.",p:"drifter"}]},
    {q:"What most often stops you from moving forward?",o:[
      {t:"Nothing — you just keep grinding, and it's wearing you down.",p:"achiever"},
      {t:"Everyone else's needs come first.",p:"fixer"},
      {t:"Fear of disappointing or upsetting someone.",p:"peacekeeper"},
      {t:"It's never quite ready or perfect.",p:"perfectionist"},
      {t:"You won't move until you can control the outcome.",p:"controller"},
      {t:"You lose interest or talk yourself out of it.",p:"drifter"}]},
    {q:"If one thing shifted, life would feel lighter. It's…",o:[
      {t:"Feeling like enough without the constant output.",p:"achiever"},
      {t:"Being able to put yourself first sometimes.",p:"fixer"},
      {t:"Saying what you actually think.",p:"peacekeeper"},
      {t:"Finishing things instead of perfecting them.",p:"perfectionist"},
      {t:"Trusting you can loosen your grip and be okay.",p:"controller"},
      {t:"Committing to something — and following through.",p:"drifter"}]}
  ];

  var stage=document.getElementById('stage');
  var idx=0, scores={}, transcript=[], resultKey=null;
  ORDER.forEach(function(k){ scores[k]=0; });

  function sid(){
    try{ var k='ovQuizSession',v=localStorage.getItem(k);
      if(!v){ v=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():('q-'+Date.now()+'-'+Math.random().toString(16).slice(2)); localStorage.setItem(k,v); } return v;
    }catch(_){ return 'q-'+Date.now(); }
  }
  var sessionId=sid();
  function esc(s){ return String(s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function set(html){ stage.innerHTML='<div class="fade">'+html+'</div>'; window.scrollTo(0,0); }

  // ---------- intro ----------
  function intro(){
    set(
      '<div class="eyebrow">The Pattern Assessment</div>'+
      '<h1>Find the pattern<br>running your life.</h1>'+
      '<p class="lede">Most people aren’t stuck for lack of effort — they’re stuck inside an unconscious pattern they never chose. This finds yours.</p>'+
      '<div class="start-row"><button class="btn btn-accent" id="startBtn">Start the assessment</button></div>'+
      '<p class="meta">6 questions · about 2 minutes · no fluff</p>'
    );
    document.getElementById('startBtn').addEventListener('click',function(){ idx=0; question(); });
  }

  // ---------- questions ----------
  function question(){
    var Q=QUESTIONS[idx];
    var pct=Math.round((idx/QUESTIONS.length)*100);
    var opts=Q.o.map(function(o,i){ return '<button class="opt" data-i="'+i+'">'+esc(o.t)+'</button>'; }).join('');
    set(
      '<div class="progress"><div class="pbar"><i style="width:'+pct+'%"></i></div><div class="pcount">'+(idx+1)+' / '+QUESTIONS.length+'</div></div>'+
      '<div class="qtext">'+esc(Q.q)+'</div>'+
      '<div class="opts">'+opts+'</div>'
    );
    stage.querySelectorAll('.opt').forEach(function(b){
      b.addEventListener('click',function(){
        var choice=Q.o[parseInt(b.getAttribute('data-i'),10)];
        scores[choice.p]+=1;
        transcript.push({role:'user',content:Q.q+' → '+choice.t});
        idx++;
        if(idx>=QUESTIONS.length){ computeResult(); resultTeaser(); }
        else question();
      });
    });
  }

  function computeResult(){
    var best=ORDER[0];
    ORDER.forEach(function(k){ if(scores[k]>scores[best]) best=k; });
    resultKey=best;
  }

  // ---------- result teaser + email gate ----------
  function resultTeaser(){
    var P=PATTERNS[resultKey];
    set(
      '<div class="res-eyebrow">Your pattern</div>'+
      '<div class="res-name">'+P.name.replace(/^The /,'The <span class="gold">')+'</span></div>'+
      '<div class="res-tag">'+esc(P.tag)+'</div>'+
      '<p class="res-teaser">'+esc(P.teaser)+'</p>'+
      '<div class="card">'+
        '<h3>Get your full breakdown</h3>'+
        '<p class="sub">What this pattern is quietly costing you — and the first move to override it. Sent straight to your inbox.</p>'+
        '<div class="lf">'+
          '<input id="qName" type="text" placeholder="First name" autocomplete="given-name" />'+
          '<input id="qEmail" type="email" placeholder="Email" autocomplete="email" />'+
          '<div class="err" id="qErr"></div>'+
          '<button class="btn btn-accent" id="qSend">Unlock my breakdown</button>'+
        '</div>'+
        '<p class="priv">No spam. Just your result and the occasional note from David.</p>'+
      '</div>'+
      '<button class="restart" id="qRestart">Start over</button>'
    );
    document.getElementById('qRestart').addEventListener('click',intro);
    document.getElementById('qSend').addEventListener('click',submitEmail);
    document.getElementById('qEmail').addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); submitEmail(); }});
  }

  async function submitEmail(){
    var name=(document.getElementById('qName').value||'').trim();
    var email=(document.getElementById('qEmail').value||'').trim();
    var err=document.getElementById('qErr');
    var btn=document.getElementById('qSend');
    err.style.display='none';
    if(!name || !email || email.indexOf('@')<1){ err.textContent='Add your first name and a valid email.'; err.style.display='block'; return; }
    btn.disabled=true; btn.textContent='Unlocking…';
    try{
      var res=await fetch(LEAD_ENDPOINT,{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({type:'quiz',name:name,email:email,note:'Pattern: '+PATTERNS[resultKey].name,sessionId:sessionId,transcript:transcript})});
      var data=await res.json();
      if(!res.ok||!data.ok) throw new Error((data&&data.error)||'failed');
      resultFull(name);
    }catch(_){ btn.disabled=false; btn.textContent='Unlock my breakdown'; err.textContent="That didn't go through — try once more?"; err.style.display='block'; }
  }

  // ---------- full result ----------
  function resultFull(name){
    var P=PATTERNS[resultKey];
    set(
      '<div class="res-eyebrow">'+(name?esc(name)+", here's your pattern":"Your pattern")+'</div>'+
      '<div class="res-name">'+P.name.replace(/^The /,'The <span class="gold">')+'</span></div>'+
      '<div class="res-tag">'+esc(P.tag)+'</div>'+
      '<p class="res-teaser">'+esc(P.teaser)+'</p>'+
      '<div class="block"><div class="label">What it’s costing you</div><p>'+esc(P.cost)+'</p></div>'+
      '<div class="block"><div class="label green">The override</div><p>'+esc(P.override)+'</p></div>'+
      '<div class="card" style="border-color:var(--accent);">'+
        '<h3>Ready to actually override it?</h3>'+
        '<p class="sub">The fastest way forward is a real conversation. Book a free call with David — you’ll leave it clearer than you came.</p>'+
        '<a class="btn btn-accent" href="'+CALENDLY+'" target="_blank" rel="noopener" style="width:100%;text-align:center;">Book your free consultation</a>'+
      '</div>'+
      '<div class="res-cta">'+
        '<a class="btn btn-ghost" href="'+GUIDE_PDF+'" target="_blank" rel="noopener">Get the free guide</a>'+
        '<button class="restart" id="qRestart2">Retake the assessment</button>'+
      '</div>'
    );
    document.getElementById('qRestart2').addEventListener('click',function(){
      ORDER.forEach(function(k){ scores[k]=0; }); transcript=[]; idx=0; resultKey=null; intro();
    });
  }

  intro();
})();
</script>
</body>
</html>
